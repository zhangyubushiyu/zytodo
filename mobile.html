<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="团队待办管理系统 - 移动端">
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>待办管理 - 移动端</title>
    <link rel="stylesheet" href="css/mobile.css">
    <script src="https://unpkg.com/hydrogen-js-sdk@2.2.1/dist/Bmob-2.2.1.min.js"></script>
    <!-- 设备检测和自动跳转 -->
    <script>
        (function() {
            // 防止无限循环：如果URL中有view=mobile参数，就不跳转
            const urlParams = new URLSearchParams(window.location.search);
            const forceView = urlParams.get('view');
            
            if (forceView === 'mobile') {
                return;
            }
            
            if (forceView === 'pc') {
                const pcUrl = window.location.pathname.replace('mobile.html', 'index.html');
                window.location.href = pcUrl;
                return;
            }
            
            // 检查是否是从index.html跳转过来的（防止无限循环）
            // 使用sessionStorage记录跳转状态
            if (sessionStorage.getItem('fromIndex')) {
                sessionStorage.removeItem('fromIndex');
                return;
            }
            
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                            window.innerWidth <= 768;
            
            if (!isMobile) {
                sessionStorage.setItem('fromMobile', 'true');
                const pcUrl = window.location.pathname.replace('mobile.html', 'index.html');
                window.location.href = pcUrl;
            }
        })();
    </script>
</head>
<body>
    <div class="mobile-container">
        <header class="mobile-header">
            <h1 id="pageTitle">待办事项</h1>
        </header>
        
        <main class="mobile-content" id="mobileContent">
            <div class="page active" id="todoPage">
                <div class="todo-header">
                    <div class="date-selector">
                        <button class="date-nav-btn" id="prevDayBtn">‹</button>
                        <span id="selectedDateText">今天</span>
                        <button class="date-nav-btn" id="nextDayBtn">›</button>
                    </div>
                    <div class="header-actions">
                        <button class="today-btn" id="todayBtn">今天</button>
                        <button class="action-btn" id="inheritBtn">继承</button>
                        <button class="action-btn danger" id="clearBtn">清除</button>
                    </div>
                </div>
                
                <div class="todo-search">
                    <input type="text" id="todoSearchInput" placeholder="搜索待办...">
                </div>
                
                <div class="todo-list" id="todoList">
                    <div class="empty-state">
                        <p>暂无待办事项</p>
                        <p class="hint">点击下方 + 按钮添加</p>
                    </div>
                </div>
            </div>
            
            <div class="page" id="calendarPage">
                <div class="calendar-header">
                    <button class="nav-btn" id="prevMonthBtn">‹</button>
                    <h2 id="currentMonthText"></h2>
                    <button class="nav-btn" id="nextMonthBtn">›</button>
                </div>
                
                <div class="calendar-weekdays">
                    <div>日</div>
                    <div>一</div>
                    <div>二</div>
                    <div>三</div>
                    <div>四</div>
                    <div>五</div>
                    <div>六</div>
                </div>
                
                <div class="calendar-days" id="calendarDays"></div>
                
                <div class="calendar-todo-preview" id="calendarTodoPreview">
                    <div class="preview-header">
                        <h3 id="previewDateTitle">今日待办</h3>
                    </div>
                    <div class="preview-list" id="previewTodoList">
                        <div class="empty-state">
                            <p>暂无待办事项</p>
                        </div>
                    </div>
                    <div class="preview-footer">
                        <button class="more-btn" id="moreTodosBtn">更多</button>
                    </div>
                </div>
            </div>
            
            <div class="page" id="managePage">
                <div class="manage-tabs">
                    <button class="tab-btn active" data-tab="category">分类</button>
                    <button class="tab-btn" data-tab="responsible">负责人</button>
                </div>
                
                <div class="manage-content">
                    <div class="tab-content active" id="categoryTab">
                        <div class="add-form">
                            <input type="text" id="newCategoryName" placeholder="分类名称">
                            <input type="color" id="newCategoryColor" value="#4CAF50">
                            <button class="add-btn" id="addCategoryBtn">+</button>
                        </div>
                        <div class="item-list" id="categoryList"></div>
                    </div>
                    
                    <div class="tab-content" id="responsibleTab">
                        <div class="add-form">
                            <input type="text" id="newResponsibleName" placeholder="负责人姓名">
                            <input type="text" id="newResponsiblePosition" placeholder="职位" class="position-input">
                            <button class="add-btn" id="addResponsibleBtn">+</button>
                        </div>
                        <div class="item-list" id="responsibleList"></div>
                    </div>
                </div>
            </div>
            
            <div class="page" id="addTodoPage">
                <div class="add-todo-form">
                    <div class="form-group">
                        <label>待办内容</label>
                        <textarea id="todoTitle" rows="3" placeholder="输入待办内容..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>类型</label>
                        <select id="todoType">
                            <option value="">选择动作</option>
                            <option value="check">检查</option>
                            <option value="feedback">反馈</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>分类</label>
                        <select id="todoCategory"></select>
                    </div>
                    
                    <div class="form-group">
                        <label>负责人</label>
                        <select id="todoResponsible" multiple></select>
                    </div>
                    
                    <div class="form-group">
                        <label>日期</label>
                        <input type="text" id="todoDate" readonly placeholder="选择日期">
                    </div>
                    
                    <div class="form-group">
                        <label>时间</label>
                        <input type="text" id="todoTime" readonly placeholder="选择时间">
                    </div>
                    
                    <div class="form-group">
                        <label>优先级</label>
                        <select id="todoPriority">
                            <option value="normal">普通</option>
                            <option value="urgent">紧急</option>
                            <option value="important">重要</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="todoReminder">
                            设置提醒
                        </label>
                    </div>
                    
                    <button class="submit-btn" id="submitTodoBtn">添加待办</button>
                </div>
            </div>
        </main>
        
        <nav class="mobile-nav">
            <button class="nav-item" data-page="calendarPage">
                <span class="nav-text">日历</span>
            </button>
            <button class="nav-item" data-page="todoPage">
                <span class="nav-text">待办</span>
            </button>
            <button class="nav-item" data-page="managePage">
                <span class="nav-text">管理</span>
            </button>
        </nav>
        
        <button class="floating-add-btn" id="floatingAddBtn">+</button>
    </div>
    
    <div class="modal" id="todoDetailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>待办详情</h3>
                <button class="close-btn" id="closeDetailModal">×</button>
            </div>
            <div class="modal-body" id="todoDetailContent"></div>
            <div class="modal-footer">
                <button class="btn-secondary" id="editTodoBtn">编辑</button>
                <button class="btn-danger" id="deleteTodoBtn">删除</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="editTodoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑待办</h3>
                <button class="close-btn" id="closeEditModal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>待办内容</label>
                    <textarea id="editTodoTitle" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <select id="editTodoType">
                        <option value="check">检查</option>
                        <option value="feedback">反馈</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="editTodoCategory"></select>
                </div>
                <div class="form-group">
                    <label>负责人</label>
                    <select id="editTodoResponsible" multiple></select>
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="text" id="editTodoDate" readonly placeholder="选择日期">
                </div>
                <div class="form-group">
                    <label>时间</label>
                    <input type="text" id="editTodoTime" readonly placeholder="选择时间">
                </div>
                <div class="form-group">
                    <label>优先级</label>
                    <select id="editTodoPriority">
                        <option value="normal">普通</option>
                        <option value="urgent">紧急</option>
                        <option value="important">重要</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelEditBtn">取消</button>
                <button class="btn-primary" id="saveEditBtn">保存</button>
            </div>
        </div>
    </div>
    
    <!-- iOS风格弹窗 -->
    <div class="ios-alert" id="iosAlert">
        <div class="ios-alert-content">
            <div class="ios-alert-title" id="iosAlertTitle"></div>
            <div class="ios-alert-message" id="iosAlertMessage"></div>
            <div class="ios-alert-actions" id="iosAlertActions"></div>
        </div>
    </div>
    
    <script src="js/bmob.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ios-alert.js"></script>
    <script src="js/date-picker.js"></script>
    <script src="js/time-picker.js"></script>
    <script src="js/select-picker.js"></script>
    <script src="js/mobile-app.js"></script>
</body>
</html>
